<svg width="900" height="390" viewBox="0 0 900 390" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Connor Wilson GitHub profile banner</title>
  <desc id="desc">Terminal-style banner for Connor Wilson, a Computer Science student focused on secure software, detection engineering, and cloud security.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="48%" stop-color="#0b1120"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>

    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07111f"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>

    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="900" height="390" rx="24" fill="url(#bg)"/>

  <rect x="20" y="20" width="860" height="350" rx="16" fill="#020617" stroke="#1e293b" stroke-width="2"/>
  <rect x="20" y="20" width="860" height="38" rx="16" fill="#0f172a"/>
  <rect x="20" y="46" width="860" height="12" fill="#0f172a"/>

  <circle cx="48" cy="39" r="5" fill="#ef4444"/>
  <circle cx="66" cy="39" r="5" fill="#f59e0b"/>
  <circle cx="84" cy="39" r="5" fill="#22c55e"/>

  <text x="112" y="44" fill="#94a3b8" font-size="14" font-family="Consolas, Monaco, monospace">
    connor@github: ~/profile
  </text>

  <g transform="translate(52 88)">
    <text x="0" y="0" fill="#38bdf8" font-size="15" font-family="Consolas, Monaco, monospace">
      connor@github:~$ whoami
    </text>

    <text x="0" y="38" fill="#f8fafc" font-size="34" font-weight="700" font-family="Segoe UI, Arial, sans-serif">
      Connor Wilson
    </text>

    <text x="0" y="78" fill="#cbd5e1" font-size="17" font-family="Segoe UI, Arial, sans-serif">
      Computer Science Student focused on secure software,
    </text>
    <text x="0" y="102" fill="#cbd5e1" font-size="17" font-family="Segoe UI, Arial, sans-serif">
      detection engineering, and cloud security.
    </text>

    <text x="0" y="146" fill="#38bdf8" font-size="15" font-family="Consolas, Monaco, monospace">
      connor@github:~$ focus --current
    </text>
    <text x="0" y="174" fill="#22c55e" font-size="15" font-family="Consolas, Monaco, monospace">
      &gt; Detection Engineering
    </text>
    <text x="0" y="198" fill="#22c55e" font-size="15" font-family="Consolas, Monaco, monospace">
      &gt; Malware Behavior Analysis
    </text>
    <text x="0" y="222" fill="#22c55e" font-size="15" font-family="Consolas, Monaco, monospace">
      &gt; Cloud Security
    </text>

    <text x="0" y="272" fill="#38bdf8" font-size="15" font-family="Consolas, Monaco, monospace">
      connor@github:~$ status
    </text>
    <text x="164" y="272" fill="#e2e8f0" font-size="15" font-family="Consolas, Monaco, monospace">
      ready
    </text>
    <rect x="214" y="258" width="8" height="18" fill="#38bdf8">
      <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
    </rect>
  </g>

  <g transform="translate(610 88)">
    <rect x="0" y="0" width="230" height="246" rx="12" fill="url(#panel)" stroke="#1e293b" stroke-width="2"/>

    <text x="22" y="36" fill="#94a3b8" font-size="13" font-family="Consolas, Monaco, monospace">
      profile.signal
    </text>
    <circle cx="197" cy="31" r="5" fill="#22c55e" filter="url(#softGlow)">
      <animate attributeName="opacity" values="0.45;1;0.45" dur="2s" repeatCount="indefinite"/>
    </circle>

    <line x1="22" y1="58" x2="208" y2="58" stroke="#1e293b" stroke-width="2"/>

    <text x="22" y="88" fill="#e2e8f0" font-size="14" font-family="Consolas, Monaco, monospace">
      secure software
    </text>
    <rect x="22" y="102" width="186" height="8" rx="4" fill="#1e293b"/>
    <rect x="22" y="102" width="132" height="8" rx="4" fill="#38bdf8">
      <animate attributeName="width" values="132;168;132" dur="3.2s" repeatCount="indefinite"/>
    </rect>

    <text x="22" y="140" fill="#e2e8f0" font-size="14" font-family="Consolas, Monaco, monospace">
      detection logic
    </text>
    <rect x="22" y="154" width="186" height="8" rx="4" fill="#1e293b"/>
    <rect x="22" y="154" width="154" height="8" rx="4" fill="#22c55e">
      <animate attributeName="width" values="154;118;154" dur="2.8s" repeatCount="indefinite"/>
    </rect>

    <text x="22" y="192" fill="#e2e8f0" font-size="14" font-family="Consolas, Monaco, monospace">
      cloud security
    </text>
    <rect x="22" y="206" width="186" height="8" rx="4" fill="#1e293b"/>
    <rect x="22" y="206" width="112" height="8" rx="4" fill="#a78bfa">
      <animate attributeName="width" values="112;148;112" dur="3.5s" repeatCount="indefinite"/>
    </rect>
  </g>

  <rect x="20" y="20" width="860" height="24" fill="#38bdf8" opacity="0.06">
    <animate attributeName="y" values="20;344;20" dur="5s" repeatCount="indefinite"/>
  </rect>
</svg>
