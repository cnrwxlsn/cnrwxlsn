<svg width="900" height="650" viewBox="0 0 900 650" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Connor Wilson GitHub profile banner</title>
  <desc id="desc">A professional terminal and monitoring dashboard banner for Connor Wilson, a Computer Science student interested in cybersecurity, software engineering, Linux systems, networking, and Python automation.</desc>

  <defs>
    <linearGradient id="backgroundGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="48%" stop-color="#0b1120"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>

    <linearGradient id="terminalGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050b16"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>

    <linearGradient id="panelGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07111f"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>

    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <style>
      .terminal-text { font-family: Consolas, Monaco, monospace; }
      .system-text { font-family: "Segoe UI", Arial, sans-serif; }
      .prompt { fill: #38bdf8; }
      .muted { fill: #94a3b8; }
      .body { fill: #cbd5e1; }
      .strong { fill: #f8fafc; }
      .good { fill: #22c55e; }
      .purple { fill: #a78bfa; }
      .panel-stroke { stroke: #1e293b; stroke-width: 2; }
    </style>
  </defs>

  <!-- Background and terminal frame -->
  <rect width="900" height="650" rx="24" fill="url(#backgroundGradient)"/>
  <rect x="20" y="20" width="860" height="610" rx="16" fill="url(#terminalGradient)" stroke="#1e293b" stroke-width="2"/>
  <rect x="20" y="20" width="860" height="38" rx="16" fill="#0f172a"/>
  <rect x="20" y="46" width="860" height="12" fill="#0f172a"/>

  <!-- Subtle scanline overlay sits behind text so it does not obscure content. -->
  <rect x="20" y="20" width="860" height="26" fill="#38bdf8" opacity="0.04">
    <animate attributeName="y" values="20;602;20" dur="6s" repeatCount="indefinite"/>
  </rect>

  <circle cx="48" cy="39" r="5" fill="#ff5f57"/>
  <circle cx="66" cy="39" r="5" fill="#ffbd2e"/>
  <circle cx="84" cy="39" r="5" fill="#28c840"/>

  <text x="112" y="44" class="terminal-text muted" font-size="14">
    connor@github: ~/profile
  </text>

  <!-- Terminal session content -->
  <g id="terminal-session" transform="translate(34 86)">
    <text x="0" y="0" class="terminal-text prompt" font-size="15">connor@github:~$ whoami</text>
    <text x="0" y="24" class="terminal-text strong" font-size="14">+-- CONNOR WILSON ---------------------+</text>
    <text x="0" y="42" class="terminal-text body" font-size="14">|  cs student | security | software    |</text>
    <text x="0" y="60" class="terminal-text strong" font-size="14">+--------------------------------------+</text>

    <text x="0" y="88" class="terminal-text prompt" font-size="15">$ cat about.md</text>
    <text x="0" y="116" class="terminal-text body" font-size="15">CS student building practical tools,</text>
    <text x="0" y="138" class="terminal-text body" font-size="15">automation scripts, and systems work.</text>
    <text x="0" y="160" class="terminal-text body" font-size="15">Readable code. Repeatable workflows.</text>
    <text x="0" y="182" class="terminal-text body" font-size="15">Linux, networks, blue-team practice.</text>

    <text x="0" y="208" class="terminal-text prompt" font-size="15">$ ls skills/</text>
    <text x="0" y="234" class="terminal-text body" font-size="15">python/      java/        javascript/  html-css/</text>
    <text x="0" y="256" class="terminal-text body" font-size="15">sql/         linux/       git/         networking/</text>

    <text x="0" y="276" class="terminal-text prompt" font-size="15">$ current_focus</text>
    <text x="0" y="302" class="terminal-text good" font-size="15">&gt; signal quality, triage, and alert logic</text>
    <text x="0" y="324" class="terminal-text good" font-size="15">&gt; malware behavior and response playbooks</text>
    <text x="0" y="346" class="terminal-text good" font-size="15">&gt; cloud, network, and secure coding basics</text>

    <text x="530" y="0" class="terminal-text prompt" font-size="15">$ projects</text>
    <text x="530" y="34" class="terminal-text body" font-size="15">mobile-map-app/</text>
    <text x="530" y="56" class="terminal-text muted" font-size="13">SwiftUI, MapKit, local GPS alerts</text>

    <text x="530" y="92" class="terminal-text body" font-size="15">systems-tools/</text>
    <text x="530" y="114" class="terminal-text muted" font-size="13">Unix-style CLIs and process workflows</text>

    <text x="530" y="150" class="terminal-text body" font-size="15">data-backed-apps/</text>
    <text x="530" y="172" class="terminal-text muted" font-size="13">C#, entity models, SQL storage</text>

    <text x="530" y="208" class="terminal-text body" font-size="15">browser-automation/</text>
    <text x="530" y="230" class="terminal-text muted" font-size="13">Python scripts, repeatable workflows</text>

    <text x="530" y="286" class="terminal-text prompt" font-size="15">$ status</text>
    <text x="530" y="318" class="terminal-text body" font-size="15">building, testing, documenting</text>
    <text x="530" y="360" class="terminal-text good" font-size="15">READY...</text>
    <rect x="600" y="346" width="5" height="15" fill="#38bdf8">
      <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Monitoring dashboard shell -->
  <g id="monitoring-dashboard" transform="translate(36 470)">
    <rect x="0" y="0" width="828" height="140" rx="12" fill="url(#panelGradient)" stroke="#1e293b" stroke-width="2"/>
    <text x="20" y="30" class="terminal-text muted" font-size="13">live_monitor</text>
    <line x1="20" y1="42" x2="808" y2="42" stroke="#1e293b" stroke-width="2"/>

    <!-- Network graph with animated packets -->
    <g id="network-graph" transform="translate(20 62)">
      <text x="0" y="0" class="terminal-text body" font-size="12">NETWORK</text>

      <line x1="88" y1="22" x2="148" y2="4" stroke="#334155" stroke-width="2"/>
      <line x1="148" y1="4" x2="214" y2="24" stroke="#334155" stroke-width="2"/>
      <line x1="88" y1="22" x2="146" y2="48" stroke="#334155" stroke-width="2"/>
      <line x1="146" y1="48" x2="214" y2="24" stroke="#334155" stroke-width="2"/>
      <line x1="148" y1="4" x2="146" y2="48" stroke="#334155" stroke-width="2"/>

      <circle cx="88" cy="22" r="6" fill="#38bdf8" filter="url(#softGlow)">
        <animate attributeName="opacity" values="0.45;1;0.45" dur="1.8s" repeatCount="indefinite"/>
      </circle>
      <circle cx="148" cy="4" r="6" fill="#a78bfa" filter="url(#softGlow)">
        <animate attributeName="opacity" values="1;0.45;1" dur="2.1s" repeatCount="indefinite"/>
      </circle>
      <circle cx="214" cy="24" r="6" fill="#22c55e" filter="url(#softGlow)">
        <animate attributeName="opacity" values="0.45;1;0.45" dur="2.3s" repeatCount="indefinite"/>
      </circle>
      <circle cx="146" cy="48" r="6" fill="#38bdf8" filter="url(#softGlow)">
        <animate attributeName="opacity" values="1;0.45;1" dur="2.5s" repeatCount="indefinite"/>
      </circle>

      <circle r="3.5" fill="#f8fafc" filter="url(#softGlow)">
        <animateMotion dur="2.7s" repeatCount="indefinite" path="M88 22 L148 4 L214 24"/>
      </circle>
      <circle r="3.5" fill="#f8fafc" filter="url(#softGlow)">
        <animateMotion dur="3.1s" repeatCount="indefinite" path="M88 22 L146 48 L214 24"/>
      </circle>
    </g>

    <!-- System metrics -->
    <g id="system-metrics" transform="translate(312 62)">
      <text x="0" y="0" class="terminal-text body" font-size="12">SYSTEM</text>

      <text x="0" y="28" class="terminal-text muted" font-size="12">CPU</text>
      <rect x="42" y="18" width="126" height="9" rx="4" fill="#1e293b"/>
      <rect x="42" y="18" width="76" height="9" rx="4" fill="#38bdf8">
        <animate attributeName="width" values="76;112;88;124;76" dur="3s" repeatCount="indefinite"/>
      </rect>

      <text x="0" y="52" class="terminal-text muted" font-size="12">MEM</text>
      <rect x="42" y="42" width="126" height="9" rx="4" fill="#1e293b"/>
      <rect x="42" y="42" width="96" height="9" rx="4" fill="#a78bfa">
        <animate attributeName="width" values="96;116;82;104;96" dur="2.6s" repeatCount="indefinite"/>
      </rect>

      <text x="196" y="28" class="terminal-text muted" font-size="12">NET</text>
      <rect x="240" y="18" width="126" height="9" rx="4" fill="#1e293b"/>
      <rect x="240" y="18" width="104" height="9" rx="4" fill="#22c55e">
        <animate attributeName="width" values="104;72;118;90;104" dur="2.8s" repeatCount="indefinite"/>
      </rect>

      <text x="196" y="52" class="terminal-text muted" font-size="12">LOG</text>
      <rect x="240" y="42" width="126" height="9" rx="4" fill="#1e293b"/>
      <rect x="240" y="42" width="58" height="9" rx="4" fill="#38bdf8">
        <animate attributeName="width" values="58;96;68;112;58" dur="3.3s" repeatCount="indefinite"/>
      </rect>
    </g>

    <!-- Activity log -->
    <g id="activity-log" transform="translate(700 62)">
      <text x="0" y="0" class="terminal-text body" font-size="12">LOG</text>
      <text x="0" y="24" class="terminal-text muted" font-size="12">[ok] ssh baseline</text>
      <text x="0" y="44" class="terminal-text good" font-size="12">[ok] auth review</text>
      <text x="0" y="64" class="terminal-text muted" font-size="12">[ok] build clean</text>

      <rect x="-4" y="10" width="128" height="17" rx="3" fill="#38bdf8" opacity="0.05">
        <animate attributeName="y" values="10;30;50;10" dur="4.5s" repeatCount="indefinite"/>
      </rect>
    </g>
  </g>
</svg>
