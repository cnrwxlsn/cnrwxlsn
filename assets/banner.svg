<svg width="900" height="260" viewBox="0 0 900 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="50%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="900" height="260" rx="24" fill="url(#bg)"/>
  <rect x="20" y="20" width="860" height="220" rx="16" fill="#020617" stroke="#1e293b" stroke-width="2"/>
  <rect x="20" y="20" width="860" height="38" rx="16" fill="#0f172a"/>
  <rect x="20" y="46" width="860" height="12" fill="#0f172a"/>

  <circle cx="48" cy="39" r="5" fill="#ef4444"/>
  <circle cx="66" cy="39" r="5" fill="#f59e0b"/>
  <circle cx="84" cy="39" r="5" fill="#22c55e"/>

  <text x="112" y="44" fill="#94a3b8" font-size="14" font-family="Consolas, Monaco, monospace">
    security-dashboard.local / profile
  </text>

  <text x="40" y="88" fill="#f8fafc" font-size="28" font-weight="700" font-family="Segoe UI, Arial, sans-serif">
    Connor Wilson
  </text>

  <text x="40" y="116" fill="#38bdf8" font-size="15" font-family="Consolas, Monaco, monospace">
    connor@github:~$
  </text>

  <text x="190" y="116" fill="#e2e8f0" font-size="15" font-family="Consolas, Monaco, monospace">
    monitor --profile --secure
  </text>

  <rect x="395" y="104" width="8" height="17" fill="#38bdf8">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>

  <text x="40" y="150" fill="#94a3b8" font-size="15" font-family="Segoe UI, Arial, sans-serif">
    Computer Science • Cybersecurity • Software Development
  </text>

  <rect x="40" y="178" width="190" height="34" rx="17" fill="#0f172a" stroke="#38bdf8"/>
  <text x="62" y="200" fill="#dbeafe" font-size="14" font-family="Consolas, Monaco, monospace">VISITORS: LIVE</text>

  <rect x="245" y="178" width="180" height="34" rx="17" fill="#0f172a" stroke="#22c55e"/>
  <text x="272" y="200" fill="#dcfce7" font-size="14" font-family="Consolas, Monaco, monospace">STATUS: ONLINE</text>

  <rect x="440" y="178" width="190" height="34" rx="17" fill="#0f172a" stroke="#a78bfa"/>
  <text x="468" y="200" fill="#ede9fe" font-size="14" font-family="Consolas, Monaco, monospace">MODE: DEFENSE</text>

  <g transform="translate(650 78)">
    <text x="0" y="0" fill="#94a3b8" font-size="13" font-family="Consolas, Monaco, monospace">NETWORK</text>

    <line x1="20" y1="44" x2="92" y2="22" stroke="#334155" stroke-width="2"/>
    <line x1="92" y1="22" x2="168" y2="48" stroke="#334155" stroke-width="2"/>
    <line x1="20" y1="44" x2="86" y2="92" stroke="#334155" stroke-width="2"/>
    <line x1="86" y1="92" x2="168" y2="48" stroke="#334155" stroke-width="2"/>
    <line x1="92" y1="22" x2="86" y2="92" stroke="#334155" stroke-width="2"/>

    <circle cx="20" cy="44" r="7" fill="#38bdf8" filter="url(#glow)">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="92" cy="22" r="7" fill="#a78bfa" filter="url(#glow)">
      <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="168" cy="48" r="7" fill="#22c55e" filter="url(#glow)">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="86" cy="92" r="7" fill="#38bdf8" filter="url(#glow)">
      <animate attributeName="opacity" values="1;0.4;1" dur="2.4s" repeatCount="indefinite"/>
    </circle>

    <circle r="4" fill="#f8fafc" filter="url(#glow)">
      <animateMotion dur="2.5s" repeatCount="indefinite" path="M20 44 L92 22 L168 48"/>
    </circle>

    <circle r="4" fill="#f8fafc" filter="url(#glow)">
      <animateMotion dur="3s" repeatCount="indefinite" path="M20 44 L86 92 L168 48"/>
    </circle>
  </g>

  <g transform="translate(650 190)">
    <text x="0" y="0" fill="#94a3b8" font-size="13" font-family="Consolas, Monaco, monospace">SIGNAL</text>

    <rect x="0" y="14" width="160" height="10" rx="5" fill="#1e293b"/>
    <rect x="0" y="14" width="90" height="10" rx="5" fill="#38bdf8">
      <animate attributeName="width" values="90;135;90" dur="2.6s" repeatCount="indefinite"/>
    </rect>

    <rect x="0" y="34" width="160" height="10" rx="5" fill="#1e293b"/>
    <rect x="0" y="34" width="120" height="10" rx="5" fill="#a78bfa">
      <animate attributeName="width" values="120;75;120" dur="2.1s" repeatCount="indefinite"/>
    </rect>

    <rect x="0" y="54" width="160" height="10" rx="5" fill="#1e293b"/>
    <rect x="0" y="54" width="65" height="10" rx="5" fill="#22c55e">
      <animate attributeName="width" values="65;145;65" dur="2.8s" repeatCount="indefinite"/>
    </rect>
  </g>

  <rect x="20" y="20" width="860" height="26" fill="#38bdf8" opacity="0.08">
    <animate attributeName="y" values="20;240;20" dur="4s" repeatCount="indefinite"/>
  </rect>
</svg>
